<section class="showcase card">
  <div class="showcase-header">
    <div>
      <h2 class="showcase-title">Las Vegas Power Esports Conference Championship</h2>
      <p class="showcase-subtitle" *ngIf="!loading && !error">
        Michigan State vs. Boise State · {{ mapName }}
      </p>
    </div>
    <button
      class="playback-toggle"
      type="button"
      (click)="togglePlayback()"
      *ngIf="!loading && !error"
    >
      {{ isPlaying ? 'Pause' : 'Play' }}
    </button>
  </div>

  <div class="canvas-wrap">
    <div #canvasContainer class="canvas-container"></div>

    <!-- Scoreboard overlay -->
    <div class="scoreboard-overlay" *ngIf="!loading && !error">
      <div class="scoreboard">
        <div class="team-block team-blue">
          <span class="team-name">Boise State</span>
          <span class="team-score">{{ blueScore }}</span>
        </div>
        <div class="clock-block">
          <span class="clock">{{ currentTime }}</span>
        </div>
        <div class="team-block team-orange">
          <span class="team-score">{{ orangeScore }}</span>
          <span class="team-name">Michigan State</span>
        </div>
      </div>
    </div>

    <div class="overlay-state" *ngIf="loading">
      <p>Loading replay preview...</p>
    </div>

    <div class="overlay-state" *ngIf="error">
      <p>{{ error }}</p>
    </div>
  </div>

  <!-- Team player tags — orange on left, blue on right -->
  <div class="teams-row" *ngIf="!loading && !error">
    <div class="team-side team-side-orange">
      <span class="team-side-label" style="color:#fb923c">Michigan State</span>
      <div class="team-pills">
        <span class="player-tag player-tag-orange" *ngFor="let name of orangePlayers">{{ name }}</span>
      </div>
    </div>
    <div class="team-divider"></div>
    <div class="team-side team-side-blue">
      <span class="team-side-label" style="color:#60a5fa">Boise State</span>
      <div class="team-pills">
        <span class="player-tag player-tag-blue" *ngFor="let name of bluePlayers">{{ name }}</span>
      </div>
    </div>
  </div>
</section>
