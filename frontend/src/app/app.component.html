<div class="page-shell">
  <main class="container">
    <app-start-screen
      [replayId]="replayId"
      [batchReplayIds]="batchReplayIds"
      [uploadStatus]="uploadStatus"
      (replayIdChange)="replayId = $event"
      (batchReplayIdsChange)="batchReplayIds = $event"
      (replayImportRequested)="handleReplayImport()"
      (batchImportRequested)="handleBatchImport()"
    ></app-start-screen>

    <nav class="tabs card" aria-label="Primary tabs">
      <button class="tab" [class.active]="activeTab === 'overview'" (click)="setActiveTab('overview')">Overview</button>
      <button class="tab" [class.active]="activeTab === 'players'" (click)="setActiveTab('players')">Players</button>
      <button class="tab" [class.active]="activeTab === 'replays'" (click)="setActiveTab('replays')">Replay List</button>
      <button class="tab" [class.active]="activeTab === 'aiCoach'" (click)="setActiveTab('aiCoach')">AI Coach</button>
    </nav>

    <section *ngIf="loading" class="card loading-card">
      <p>Loading dashboard data...</p>
    </section>

    <section *ngIf="!loading && activeTab === 'overview'">
      <div class="stat-grid">
        <article class="stat-card" *ngFor="let stat of overviewStats">
          <p class="stat-title">{{ stat.label }}</p>
          <p class="stat-value">{{ stat.value }}</p>
        </article>
      </div>

      <div class="card filters-card">
        <div class="player-filter-group">
          <label for="playerSelect">Select Player</label>
          <select
            id="playerSelect"
            class="select-field"
            [ngModel]="selectedPlayerId"
            (ngModelChange)="selectPlayer($event)"
          >
            <option [ngValue]="null">Select a player</option>
            <option *ngFor="let player of players" [ngValue]="player.playerId">
              {{ player.playerName }} - {{ player.matchesPlayed }} matches
            </option>
          </select>
        </div>

        <div class="range-filter-group">
          <label for="rangeSelect">Range</label>
          <select id="rangeSelect" class="select-field" [(ngModel)]="filter.days" (change)="fetchTrends()">
            <option [ngValue]="7">Last 7 Days</option>
            <option [ngValue]="30">Last 30 Days</option>
            <option [ngValue]="90">Last 90 Days</option>
          </select>
        </div>
      </div>

      <section *ngIf="selectedPlayer && trends.length" class="card trends-card">
        <h2>{{ selectedPlayer.playerName }} Performance Trends</h2>
        <div class="trend-list">
          <article *ngFor="let trend of trends" class="trend-row">
            <span>{{ trend.date }}</span>
            <span>
              G: {{ stripZeros(trend.averageGoals) }}
              · A: {{ stripZeros(trend.averageAssists) }}
              · S: {{ stripZeros(trend.averageSaves) }}
            </span>
          </article>
        </div>
      </section>
    </section>

    <section *ngIf="!loading && activeTab === 'players'">
      <app-players-list
        [players]="players"
        [selectedPlayerId]="selectedPlayerId"
        (playerSelected)="selectPlayer($event)"
      ></app-players-list>
    </section>

    <section *ngIf="!loading && activeTab === 'replays'">
      <app-replay-list [matches]="matches"></app-replay-list>
    </section>

    <section *ngIf="!loading && activeTab === 'aiCoach'">
      <app-ai-coach></app-ai-coach>
    </section>
  </main>
</div>
