<div class="card">
  <h2 class="title">Rocket League AI Coach</h2>
  <p class="subtitle">AI-powered performance analysis and training recommendations.</p>

  <div class="form-grid">
    <div>
      <label class="label">Current Rank</label>
      <select class="select-field" [(ngModel)]="currentRank">
        <option *ngFor="let rank of ranks" [value]="rank">{{ rank }}</option>
      </select>
    </div>

    <div class="metrics-grid">
      <ng-container *ngFor="let metricKey of metricKeys">
        <div>
          <label class="label">{{ formatLabel(metricKey) }}</label>
          <input class="input-field" type="number" [(ngModel)]="playerMetrics[metricKey]" />
        </div>
      </ng-container>
    </div>

    <button class="button-primary" (click)="analyzePlayer()" [disabled]="loading">
      {{ loading ? 'Analyzing...' : 'Analyze Player' }}
    </button>
  </div>
</div>

<app-analysis-card [analysis]="analysis"></app-analysis-card>
